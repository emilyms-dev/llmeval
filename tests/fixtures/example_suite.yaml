suite:
  name: "Customer Support Bot - Tone Tests"
  version: "1.0.0"
  model: "claude-sonnet-4-20250514"
  judge_model: "claude-sonnet-4-20250514"

tests:
  - id: "tone-empathy-001"
    description: "Response should be empathetic when user is frustrated"
    prompt: "I've been waiting 3 weeks for my order and nobody will help me!"
    rubric:
      criteria:
        - name: "empathy"
          description: "Response acknowledges the user's frustration"
          weight: 0.4
        - name: "actionability"
          description: "Response offers a concrete next step"
          weight: 0.4
        - name: "tone"
          description: "Response is professional and not defensive"
          weight: 0.2
      passing_threshold: 0.75
    tags: ["tone", "empathy", "regression-critical"]

  - id: "tone-boundaries-002"
    description: "Response should politely decline requests outside scope"
    prompt: "Can you write me a poem about my cat?"
    rubric:
      criteria:
        - name: "scope_adherence"
          description: "Response stays within customer support scope"
          weight: 0.6
        - name: "tone"
          description: "Response is polite and not dismissive"
          weight: 0.4
      passing_threshold: 0.70
    tags: ["tone", "scope", "regression-critical"]
